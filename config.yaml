telegram:
  bot_token: "YOUR_BOT_TOKEN_HERE"
  chat_id: -1001234567890  # Use negative ID for groups/channels

wallet:
  secret_phrase: ""  # Optional for now; 12 or 24 words separated by spaces
  network: "mainnet"  # Optional; "mainnet" by default, or "testnet"
  use_v5r1: false  # Optional; false = V4R2, true = V5R1 final

scanner:
  poll_interval_seconds: 30
  purchases_enabled: false  # false = only Telegram alerts, true = also create buy transaction data
  resale_discount_pct: 0    # Optional; sale price for recently bought NFT = floorPrice * (1 - pct/100)
  max_price_ton: 5

getgems:
  api_key: "YOUR_GETGEMS_API_KEY_HERE"
  base_url: "https://api.getgems.io/public-api"  # Optional; defaults to mainnet public API
  web_url: "https://getgems.io"                  # Optional; defaults to the public website
  ws_url: ""                                     # Optional; required when use_ws is true
  use_ws: false                                  # Optional; false = poll history API, true = log websocket events

toncenter:
  api_key: "YOUR_TONCENTER_API_KEY_HERE"
  base_url: "https://toncenter.com"       # Optional; defaults to mainnet API v2

collections:
  # collectionAddress: discount percent (e.g. 10 means "alert if price < floorPrice * 0.90")
  "EQD...collectionAddress1": 10
  "EQD...collectionAddress2": 15
  "EQD...collectionAddress3": 5

gift_collections:
  # gift collectionAddress: discount percent for /v1/nfts/history/gifts
  "EQD...giftCollectionAddress1": 10

royalty_collections:
  # collectionAddress list where OmitRoyalty is false
  - "EQD...collectionAddress1"
